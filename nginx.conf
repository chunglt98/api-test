server {
    listen 80;
    server_name api-test.chungle.io.vn;

    # Redirect HTTP → HTTPS (bỏ block này nếu chưa có SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api-test.chungle.io.vn;

    # SSL certificates (ví dụ dùng certbot/Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/api-test.chungle.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-test.chungle.io.vn/privkey.pem;

    # Proxy TẤT CẢ request về uvicorn
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cần thiết cho Server-Sent Events (SSE stream)
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }
}
